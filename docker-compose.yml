version: "3.9"

# =============================================================
# Secrets Management Demo — Docker Compose
# Servicii: Vault + Flask App + PostgreSQL
# =============================================================

services:

  # ── HashiCorp Vault ────────────────────────────────────────
  vault:
    image: hashicorp/vault:1.17
    container_name: vault
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
      VAULT_LOG_LEVEL: "info"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault-data:/vault/data
      - vault-logs:/vault/logs
      - ./vault-config/vault.hcl:/vault/config/vault.hcl:ro
    command: server -dev -dev-root-token-id=root
    networks:
      - backend
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Vault Init (ruleaza o singura data) ───────────────────
  vault-init:
    image: hashicorp/vault:1.17
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "root"
    volumes:
      - ./scripts/vault-init.sh:/init.sh:ro
      - init-output:/output
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - backend
    restart: "no"

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: production_db
      POSTGRES_USER: app_user
      # Parola generata de Vault; pentru demo folosim o valoare initiala
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d production_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Flask App (AFTER — securizata) ────────────────────────
  flask-app:
    build:
      context: ./after/app
      dockerfile: Dockerfile
    container_name: flask-app
    restart: unless-stopped
    depends_on:
      vault:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - .env.app          # VAULT_ADDR, VAULT_ROLE_ID, VAULT_SECRET_ID
    environment:
      FLASK_ENV: production
      PYTHONUNBUFFERED: "1"
    ports:
      - "5000:5000"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

# ── Retele ────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

# ── Volume-uri ────────────────────────────────────────────────
volumes:
  vault-data:
  vault-logs:
  pg-data:
  init-output:

# ── Docker Secrets (parola DB) ────────────────────────────────
secrets:
  db_password:
    file: ./secrets/db_password.txt
